{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Sign out" %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 text-center">
    <h1 class="h4 mb-3">{% trans "Sign out" %}</h1>
    <p>{% trans "Are you sure you want to sign out?" %}</p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary">{% trans "Yes, sign out" %}</button>
      <a href="{% url 'experiments:index' %}" class="btn btn-secondary ml-2">{% trans "Cancel" %}</a>
    </form>
  </div>
</div>
{% endblock %}
