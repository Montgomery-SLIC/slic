{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password reset sent" %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <h1 class="h4 mb-3">{% trans "Check your email" %}</h1>
    <p>{% trans "We've sent a password reset link. Please check your inbox." %}</p>
    <a href="{% url 'account_login' %}" class="btn btn-secondary">{% trans "Back to sign in" %}</a>
  </div>
</div>
{% endblock %}
