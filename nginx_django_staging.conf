# Nginx config for SLIC Django staging (port 8443)
# Replaces the Rails staging nginx block - Django staging runs on the same port.
#
# Place in /etc/nginx/sites-available/slic_django_staging
# Enable:
#   rm /etc/nginx/sites-enabled/slic_staging.conf
#   ln -s /etc/nginx/sites-available/slic_django_staging /etc/nginx/sites-enabled/slic_django_staging

upstream slic_django_staging {
    server 127.0.0.1:9294;
}

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name slic.shef.ac.uk;

    ssl_certificate     /etc/ssl/certs/slic.shef.ac.uk.pem;
    ssl_certificate_key /etc/ssl/private/slic.shef.ac.uk.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 350M;

    error_log  /var/log/nginx/slic_django_staging_error_log error;
    access_log /var/log/nginx/slic_django_staging_access_log;

    auth_basic           "SLIC Django staging";
    auth_basic_user_file /etc/apache2/.htpasswd;

    location /static/ {
        alias /srv/slic/staging/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # X-Accel-Redirect - Nginx serves media files directly, bypassing Gunicorn
    location /protected-media/ {
        internal;
        alias /srv/slic/staging/media/;
    }

    location / {
        proxy_pass http://slic_django_staging;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 120;
    }
}
