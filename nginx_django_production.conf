# Nginx config for SLIC Django production (port 443)
# Place in /etc/nginx/sites-available/slic_django_production

upstream slic_django_production {
    server 127.0.0.1:9295;
}

server {
    listen 80;
    server_name slic.shef.ac.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name slic.shef.ac.uk;

    ssl_certificate     /etc/ssl/certs/slic.shef.ac.uk.pem;
    ssl_certificate_key /etc/ssl/private/slic.shef.ac.uk.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 350M;

    location /static/ {
        alias /srv/slic/production/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /protected-media/ {
        internal;
        alias /srv/slic/production/media/;
    }

    location / {
        proxy_pass http://slic_django_production;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}
